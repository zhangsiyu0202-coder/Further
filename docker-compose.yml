services:
  neo4j:
    image: neo4j:5.26
    container_name: agentsociety-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-agentsociety123}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-agentsociety123} 'RETURN 1;' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins

  backend:
    build:
      context: ./agentsociety2
      dockerfile: Dockerfile
    container_name: agentsociety-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8001
      WORLD_DB_PATH: /app/data/sqlite/agentsociety_world.backend.db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-agentsociety123}
      NEO4J_WAIT_TIMEOUT: 90
      NEO4J_WAIT_INTERVAL: 2
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_BASE: ${LLM_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDER_API_KEY: ${EMBEDDER_API_KEY:-}
      EMBEDDER_API_BASE: ${EMBEDDER_API_BASE:-https://api.openai.com/v1}
      EMBEDDER_MODEL: ${EMBEDDER_MODEL:-text-embedding-3-small}
    ports:
      - "8001:8001"
    volumes:
      - ./data/sqlite:/app/data/sqlite

  frontend:
    build:
      context: ./further
      dockerfile: Dockerfile
    container_name: agentsociety-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
